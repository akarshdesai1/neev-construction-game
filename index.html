<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Neev's Construction Site!</title>
<style>
  :root{ color-scheme: light; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
     user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    font-family:'Comic Sans MS','Baloo 2',system-ui,-apple-system,sans-serif;
    background:#7ec8ff;
  }
  #app{ position:fixed; inset:0; height:100dvh; }

  /* ---------- START SCREEN ---------- */
  #startScreen{
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; padding:20px; text-align:center;
    background: linear-gradient(180deg,#7ec8ff 0%, #a8e6a1 55%, #d9b06c 100%);
    overflow:hidden;
  }
  #startScreen .deco{
    position:absolute; font-size:54px; opacity:0.9; user-select:none; pointer-events:none;
    animation: bob 2.4s ease-in-out infinite;
  }
  #startScreen h1{
    font-size:clamp(28px,7vw,58px); color:#ff5722; margin:0;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.15);
    line-height:1.15;
  }
  #playBtn{
    font-size:clamp(28px,6vw,44px); font-weight:bold; font-family:inherit;
    color:#fff; background:linear-gradient(180deg,#7ed957,#3fa832);
    border:6px solid #fff; border-radius:100px;
    padding:22px 64px; box-shadow:0 10px 0 #2c7d24, 0 16px 24px rgba(0,0,0,0.25);
    cursor:pointer; animation: pulse 1.4s ease-in-out infinite;
  }
  #playBtn:active{ transform:translateY(8px); box-shadow:0 2px 0 #2c7d24; }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }

  #startScreen[hidden], #game[hidden]{ display:none !important; }

  /* ---------- GAME SCREEN ---------- */
  #game{
    position:absolute; inset:0; z-index:10; padding:8px; gap:8px;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr);
  }
  @media (max-aspect-ratio: 4/5){
    #game{ grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(3,1fr); }
  }
  #homeBtn{
    position:absolute; top:8px; left:8px; z-index:30;
    width:46px; height:46px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,0.55); font-size:22px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lane{
    position:relative; min-height:0; overflow:hidden; cursor:pointer;
    border-radius:20px; border:4px solid rgba(255,255,255,0.7);
    box-shadow:0 6px 0 rgba(0,0,0,0.15);
  }
  .vehicle-wrap{
    position:absolute; inset:0; display:flex; align-items:center;
    transform:translateX(0px);
    will-change: transform;
  }
  .vehicle-svg{ height:72%; width:auto; display:block; margin-left:14px; overflow:visible; }
  .label{
    position:absolute; top:6px; left:14px; z-index:2;
    background:rgba(255,255,255,0.75); color:#333; font-weight:bold;
    padding:3px 12px; border-radius:14px; font-size:clamp(12px,2.6vh,18px);
    pointer-events:none;
  }

  /* moving part animation hooks (JS sets --dur and toggles .animate) */
  .bucket-part, .blade-part, .bed-part, .hook-part, .drum-part, .hammer-part{
    transform-box: fill-box;
  }
  .blade-part{ transform-origin: 95% 55%; }
  .bed-part{ transform-origin: 88% 100%; }
  .drum-part{ transform-origin: 50% 50%; }
  /* pivot at the wrist where the stick meets the bucket (local, un-translated coords) */
  .bucket-part{ transform-origin: 50px 11px; }
  /* pivot at the top of the hook, where it hangs from the boom (local, un-translated coords) */
  .hook-part{ transform-origin: 8px 0px; }
  /* arm-part/boom-part contain a translated child, which inflates their fill-box bounding box
     and throws off a percentage-based pivot — use the SVG viewBox coordinate system instead
     so the pivot stays exactly where the part visually attaches to the vehicle body */
  .arm-part, .boom-part{ transform-box: view-box; }
  .arm-part{ transform-origin: 118px 100px; }
  .boom-part{ transform-origin: 120px 17px; }

  .blade-part.animate{ animation: scoop var(--dur,1s) ease-in-out infinite; }
  .arm-part.animate{ animation: armSwing var(--dur,1s) ease-in-out infinite; }
  .bucket-part.animate{ animation: bucketCurl var(--dur,1s) ease-in-out infinite; }
  .bed-part.animate{ animation: tip var(--dur,1s) ease-in-out infinite; }
  .boom-part.animate{ animation: boomSwing var(--dur,1s) ease-in-out infinite; }
  .hook-part.animate{ animation: hookSway var(--dur,1s) ease-in-out infinite; }
  .drum-part.animate{ animation: spinDrum calc(var(--dur,1s) / 3) linear infinite; }
  .hammer-part.animate{ animation: hammerBang var(--dur,1s) ease-in infinite; }

  @keyframes scoop{ 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(24deg);} }
  @keyframes armSwing{ 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(-32deg);} }
  @keyframes bucketCurl{ 0%,100%{transform:rotate(8deg);} 50%{transform:rotate(65deg);} }
  @keyframes tip{ 0%,18%,100%{transform:rotate(0deg);} 55%,75%{transform:rotate(-28deg);} }
  @keyframes boomSwing{ 0%,100%{transform:rotate(-12deg);} 50%{transform:rotate(16deg);} }
  @keyframes hookSway{ 0%,100%{transform:rotate(-8deg);} 50%{transform:rotate(8deg);} }
  @keyframes spinDrum{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes hammerBang{
    0%{transform:translateY(0);}
    28%{transform:translateY(-38px);}
    42%{transform:translateY(4px);}
    52%{transform:translateY(-3px);}
    65%,100%{transform:translateY(0);}
  }
</style>
</head>
<body>
<div id="app">

  <div id="startScreen">
    <div class="deco" style="top:8%; left:8%; animation-delay:0s;">🚧</div>
    <div class="deco" style="top:14%; right:10%; animation-delay:0.6s;">🏗️</div>
    <div class="deco" style="bottom:10%; left:12%; animation-delay:1.1s;">🚜</div>
    <div class="deco" style="bottom:8%; right:8%; animation-delay:0.3s;">🚛</div>
    <h1>Neev's<br>construction site!</h1>
    <button id="playBtn">▶ PLAY</button>
  </div>

  <div id="game" hidden>
    <button id="homeBtn" aria-label="Home">🏠</button>

    <div class="lane" data-vehicle="bulldozer" style="background:#e0c084;">
      <div class="label">Bulldozer</div>
      <div class="vehicle-wrap">
        <svg class="vehicle-svg" viewBox="0 0 300 160">
          <rect x="20" y="112" width="230" height="28" rx="14" fill="#222"/>
          <rect x="35" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="65" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="95" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="125" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="155" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="185" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="215" y="120" width="16" height="12" rx="4" fill="#555"/>
          <rect x="100" y="55" width="150" height="60" rx="10" fill="#FFC107"/>
          <rect x="150" y="65" width="55" height="34" rx="6" fill="#FDD835"/>
          <rect x="160" y="72" width="35" height="22" rx="4" fill="#8FD8FF" stroke="#333" stroke-width="2"/>
          <rect x="215" y="45" width="14" height="20" rx="3" fill="#555"/>
          <g class="blade-part moving-part">
            <rect x="55" y="86" width="60" height="9" rx="4" fill="#5a5a5a"/>
            <polygon points="18,68 60,68 66,120 12,120" fill="#616161" stroke="#333" stroke-width="3"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="lane" data-vehicle="excavator" style="background:#cbb994;">
      <div class="label">Excavator</div>
      <div class="vehicle-wrap">
        <svg class="vehicle-svg" viewBox="0 0 300 190">
          <rect x="30" y="140" width="200" height="26" rx="13" fill="#222"/>
          <circle cx="55" cy="153" r="10" fill="#555"/>
          <circle cx="95" cy="153" r="10" fill="#555"/>
          <circle cx="135" cy="153" r="10" fill="#555"/>
          <circle cx="175" cy="153" r="10" fill="#555"/>
          <circle cx="205" cy="153" r="10" fill="#555"/>
          <ellipse cx="120" cy="118" rx="80" ry="42" fill="#FF7043"/>
          <rect x="95" y="90" width="55" height="35" rx="6" fill="#FF8A65"/>
          <rect x="103" y="97" width="38" height="22" rx="4" fill="#8FD8FF" stroke="#333" stroke-width="2"/>
          <g class="arm-part moving-part">
            <rect x="118" y="94" width="100" height="16" rx="8" fill="#EF6C00"/>
            <g transform="translate(210,90)">
              <g class="bucket-part moving-part">
                <rect x="0" y="0" width="55" height="14" rx="7" fill="#EF6C00"/>
                <polygon points="50,-4 85,20 70,42 40,30" fill="#4E342E" stroke="#222" stroke-width="3"/>
              </g>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="lane" data-vehicle="dumptruck" style="background:#e6a35c;">
      <div class="label">Dump Truck</div>
      <div class="vehicle-wrap">
        <svg class="vehicle-svg" viewBox="0 0 300 170">
          <circle cx="70" cy="140" r="20" fill="#222"/>
          <circle cx="70" cy="140" r="8" fill="#888"/>
          <circle cx="230" cy="140" r="20" fill="#222"/>
          <circle cx="230" cy="140" r="8" fill="#888"/>
          <rect x="30" y="80" width="70" height="60" rx="10" fill="#E53935"/>
          <rect x="42" y="90" width="42" height="30" rx="6" fill="#8FD8FF" stroke="#333" stroke-width="2"/>
          <rect x="100" y="112" width="150" height="8" fill="#555"/>
          <g class="bed-part moving-part">
            <rect x="95" y="55" width="150" height="60" rx="10" fill="#FDD835" stroke="#B8860B" stroke-width="3"/>
            <rect x="105" y="45" width="130" height="18" rx="6" fill="#FBC02D"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="lane" data-vehicle="roadroller" style="background:#b7c9a8;">
      <div class="label">Road Roller</div>
      <div class="vehicle-wrap">
        <svg class="vehicle-svg" viewBox="0 0 300 170">
          <circle cx="220" cy="130" r="18" fill="#222"/>
          <circle cx="220" cy="130" r="7" fill="#888"/>
          <rect x="120" y="70" width="110" height="55" rx="10" fill="#43A047"/>
          <rect x="140" y="80" width="45" height="28" rx="5" fill="#8FD8FF" stroke="#333" stroke-width="2"/>
          <rect x="60" y="105" width="90" height="14" fill="#555"/>
          <g class="drum-part moving-part">
            <circle cx="65" cy="130" r="38" fill="#333"/>
            <circle cx="65" cy="130" r="38" fill="none" stroke="#666" stroke-width="4"/>
            <line x1="65" y1="94" x2="65" y2="166" stroke="#777" stroke-width="5"/>
            <line x1="29" y1="130" x2="101" y2="130" stroke="#777" stroke-width="5"/>
          </g>
        </svg>
      </div>
    </div>

    <div class="lane" data-vehicle="crane" style="background:#d8cfa0;">
      <div class="label">Crane</div>
      <div class="vehicle-wrap">
        <svg class="vehicle-svg" viewBox="0 0 300 230">
          <rect x="40" y="185" width="180" height="24" rx="12" fill="#222"/>
          <rect x="55" y="192" width="14" height="10" fill="#555"/>
          <rect x="85" y="192" width="14" height="10" fill="#555"/>
          <rect x="115" y="192" width="14" height="10" fill="#555"/>
          <rect x="145" y="192" width="14" height="10" fill="#555"/>
          <rect x="175" y="192" width="14" height="10" fill="#555"/>
          <rect x="70" y="150" width="90" height="40" rx="8" fill="#FDD835"/>
          <rect x="85" y="158" width="35" height="24" rx="4" fill="#8FD8FF" stroke="#333" stroke-width="2"/>
          <rect x="105" y="20" width="20" height="135" fill="#FBC02D" stroke="#B8860B" stroke-width="2"/>
          <g class="boom-part moving-part">
            <rect x="112" y="10" width="150" height="14" rx="6" fill="#F9A825"/>
            <g transform="translate(250,20)">
              <g class="hook-part moving-part">
                <line x1="0" y1="0" x2="0" y2="55" stroke="#555" stroke-width="4"/>
                <rect x="-8" y="55" width="16" height="16" rx="3" fill="#616161"/>
              </g>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="lane" data-vehicle="piledriver" style="background:#c9b7a8;">
      <div class="label">Piling Machine</div>
      <div class="vehicle-wrap">
        <svg class="vehicle-svg" viewBox="0 0 300 230">
          <rect x="40" y="195" width="200" height="24" rx="12" fill="#222"/>
          <rect x="60" y="202" width="16" height="10" fill="#555"/>
          <rect x="95" y="202" width="16" height="10" fill="#555"/>
          <rect x="130" y="202" width="16" height="10" fill="#555"/>
          <rect x="165" y="202" width="16" height="10" fill="#555"/>
          <rect x="200" y="202" width="16" height="10" fill="#555"/>
          <rect x="70" y="150" width="90" height="45" rx="8" fill="#8E24AA"/>
          <rect x="85" y="158" width="35" height="26" rx="4" fill="#8FD8FF" stroke="#333" stroke-width="2"/>
          <rect x="150" y="20" width="12" height="175" fill="#616161"/>
          <rect x="205" y="20" width="12" height="175" fill="#616161"/>
          <rect x="150" y="20" width="67" height="10" fill="#616161"/>
          <line x1="156" y1="30" x2="156" y2="90" stroke="#999" stroke-width="3"/>
          <line x1="211" y1="30" x2="211" y2="90" stroke="#999" stroke-width="3"/>
          <g class="hammer-part moving-part">
            <rect x="150" y="90" width="67" height="34" rx="4" fill="#D32F2F" stroke="#7a1414" stroke-width="3"/>
          </g>
        </svg>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  var VEHICLES = {
    bulldozer:  "Bulldozer",
    excavator:  "Excavator",
    dumptruck:  "Dump Truck",
    roadroller: "Road Roller",
    crane:      "Crane",
    piledriver: "Piling Machine"
  };

  var OUT_MS = 2100, BACK_MS = 2100;
  var ROUND_TRIP_S = (OUT_MS + BACK_MS) / 1000;

  // pick the friendliest-sounding available voice instead of the default flat/robotic one
  function pickVoice(){
    if(!("speechSynthesis" in window)) return null;
    var voices = window.speechSynthesis.getVoices();
    if(!voices.length) return null;
    var en = voices.filter(function(v){ return /^en/i.test(v.lang); });
    var pool = en.length ? en : voices;
    var niceNames = /female|natural|google|zira|aria|samantha|victoria|karen|jenny|child|kids/i;
    var preferred = pool.find(function(v){ return niceNames.test(v.name); });
    if(!preferred) preferred = pool.find(function(v){ return v.localService === false; });
    return preferred || pool[0];
  }

  var currentUtterance = null; // keep a live reference so Safari/Chrome don't garbage-collect it mid-speech
  function speak(text){
    if(!("speechSynthesis" in window)) return;
    try{
      window.speechSynthesis.cancel();
      window.speechSynthesis.resume(); // iOS Safari can leave the queue paused
      var u = new SpeechSynthesisUtterance(text);
      // fetch the voice fresh on every call instead of reusing a cached object -
      // iOS Safari can silently fail to speak (no sound, no error) if given a stale voice reference
      var v = pickVoice();
      if(v) u.voice = v;
      u.rate = 1.08; u.pitch = 1.45; u.volume = 1;
      currentUtterance = u;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }

  function activateLane(lane){
    if(lane.dataset.busy === "1") return;
    lane.dataset.busy = "1";

    var key = lane.dataset.vehicle;
    var wrap = lane.querySelector(".vehicle-wrap");
    var svg = lane.querySelector(".vehicle-svg");
    var parts = lane.querySelectorAll(".moving-part");

    speak(VEHICLES[key] + "!");

    parts.forEach(function(p){
      p.style.setProperty("--dur", ROUND_TRIP_S + "s");
      p.classList.add("animate");
    });

    var laneRect = lane.getBoundingClientRect();
    var svgRect = svg.getBoundingClientRect();
    var travel = Math.max(30, laneRect.width - svgRect.width - 30);

    wrap.style.transition = "transform " + (OUT_MS/1000) + "s cubic-bezier(.45,.05,.55,.95)";
    wrap.style.transform = "translateX(" + travel + "px)";

    setTimeout(function(){
      wrap.style.transition = "transform " + (BACK_MS/1000) + "s cubic-bezier(.45,.05,.55,.95)";
      wrap.style.transform = "translateX(0px)";
    }, OUT_MS);

    setTimeout(function(){
      parts.forEach(function(p){ p.classList.remove("animate"); });
      lane.dataset.busy = "0";
    }, OUT_MS + BACK_MS + 60);
  }

  // "click" (not pointerdown/touchstart) is the event type mobile browsers recognize as a genuine
  // user activation gesture for gated APIs like speechSynthesis - pointerdown fires the instant a
  // finger touches down, before the browser considers it a completed user gesture.
  document.querySelectorAll(".lane").forEach(function(lane){
    lane.addEventListener("click", function(e){
      e.preventDefault();
      activateLane(lane);
    });
  });

  var startScreen = document.getElementById("startScreen");
  var game = document.getElementById("game");
  var playBtn = document.getElementById("playBtn");
  var homeBtn = document.getElementById("homeBtn");

  playBtn.addEventListener("click", function(e){
    e.preventDefault();
    startScreen.hidden = true;
    game.hidden = false;
    speak("Yay, let's build!");
  });

  homeBtn.addEventListener("click", function(e){
    e.preventDefault();
    if("speechSynthesis" in window) window.speechSynthesis.cancel();
    game.hidden = true;
    startScreen.hidden = false;
  });

})();
</script>
</body>
</html>
